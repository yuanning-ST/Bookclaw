<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookClaw Agent</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --user-bg: linear-gradient(135deg, #6366f1, #8b5cf6);
            --ai-bg: #f1f5f9;
            --sidebar-bg: #1e293b;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
        }
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 16px;
        }
        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header h2::before {
            content: "📚";
        }
        .book-list {
            flex: 1;
            overflow-y: auto;
        }
        .book-item {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
        }
        .book-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .book-item.active {
            background: var(--primary);
        }
        .book-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .book-size {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        .book-list::-webkit-scrollbar {
            width: 4px;
        }
        .book-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }
        /* Main content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .header {
            text-align: center;
            padding: 24px 0;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .header h1::before {
            content: "🤖";
            font-size: 32px;
        }
        .header p {
            color: var(--text-light);
            font-size: 14px;
            margin-top: 8px;
        }
        .chat-container {
            flex: 1;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 400px;
            max-height: calc(100vh - 280px);
        }
        .chat-container:empty::before {
            content: "开始对话吧 ✨";
            color: var(--text-light);
            font-size: 16px;
            text-align: center;
            padding: 60px 0;
        }
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.human {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.ai {
            align-self: flex-start;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .message.human .avatar {
            background: var(--user-bg);
            color: white;
        }
        .message.ai .avatar {
            background: var(--ai-bg);
            color: var(--text);
        }
        .bubble {
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 15px;
        }
        .message.human .bubble {
            background: var(--user-bg);
            color: white;
            border-radius: 16px 16px 4px 16px;
        }
        .message.ai .bubble {
            background: var(--ai-bg);
            color: var(--text);
            border-radius: 16px 16px 16px 4px;
        }
        .input-area {
            margin-top: 20px;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }
        .input-area input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .input-area input:disabled {
            background: var(--ai-bg);
            cursor: not-allowed;
        }
        .input-area button {
            padding: 14px 28px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .input-area button:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .input-area button:disabled {
            background: var(--text-light);
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 14px;
            padding: 8px 0;
        }
        .loading::before {
            content: "";
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .system-msg, .tool-msg {
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 4px 0;
            opacity: 0.8;
        }
        .system-msg {
            background: #fef3c7;
            color: #92400e;
            align-self: center;
        }
        .tool-msg {
            background: #fee2e2;
            color: #991b1b;
            align-self: center;
        }
        /* Scrollbar */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        /* Empty state */
        .empty-books {
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 40px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>图书库</h2>
        </div>
        <div class="book-list" id="bookList"></div>
    </aside>

    <main class="main">
        <div class="container">
            <div class="header">
                <h1>BookClaw Agent</h1>
                <p>你的个人知识库管理助手</p>
            </div>
            <div class="chat-container" id="chat"></div>
            <div class="input-area">
                <input type="text" id="input" placeholder="输入您的问题..." autofocus>
                <button id="send" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </main>

    <script>
        let messages = [];
        let books = [];
        let selectedBook = null;

        // Load books on page load
        async function loadBooks() {
            try {
                const response = await fetch('/books');
                const data = await response.json();
                books = data.books || [];
                renderBooks();
            } catch (error) {
                console.error('Failed to load books:', error);
            }
        }

        function renderBooks() {
            const list = document.getElementById('bookList');
            if (books.length === 0) {
                list.innerHTML = '<div class="empty-books">暂无图书</div>';
                return;
            }
            list.innerHTML = books.map((book, idx) => `
                <div class="book-item ${selectedBook === idx ? 'active' : ''}" onclick="selectBook(${idx})">
                    <div class="book-title">${book.name}</div>
                    <div class="book-size">${book.size}</div>
                </div>
            `).join('');
        }

        function selectBook(idx) {
            selectedBook = idx;
            renderBooks();
            // Optionally add context message
            const book = books[idx];
            const input = document.getElementById('input');
            input.value = `关于《${book.name}》这本书，`;
            input.focus();
        }

        function renderMessages() {
            const chat = document.getElementById('chat');
            chat.innerHTML = '';
            for (const msg of messages) {
                const div = document.createElement('div');

                if (msg.type === 'system') {
                    div.className = 'system-msg';
                    div.textContent = msg.content;
                } else if (msg.type === 'tool') {
                    div.className = 'tool-msg';
                    div.textContent = `[${msg.name || 'tool'}] ${msg.content}`;
                } else {
                    div.className = `message ${msg.type}`;

                    const avatar = document.createElement('div');
                    avatar.className = 'avatar';
                    avatar.textContent = msg.type === 'human' ? '👤' : '🤖';
                    div.appendChild(avatar);

                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    bubble.textContent = msg.content;
                    div.appendChild(bubble);
                }
                chat.appendChild(div);
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function addLoading() {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'loading';
            div.id = 'loading';
            div.textContent = '思考中...';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const sendBtn = document.getElementById('send');
            const userInput = input.value.trim();

            if (!userInput) return;

            input.disabled = true;
            sendBtn.disabled = true;
            input.value = '';

            messages.push({ type: 'human', content: userInput });
            renderMessages();
            addLoading();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: messages.slice(0, -1),
                        user_input: userInput,
                        selected_book: selectedBook !== null ? books[selectedBook].filename : null
                    })
                });

                const data = await response.json();
                messages = data.messages;
                renderMessages();
            } catch (error) {
                console.error('Error:', error);
                messages.push({ type: 'ai', content: '网络错误，请稍后重试' });
                renderMessages();
            }

            removeLoading();
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        }

        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initialize
        loadBooks();
    </script>
</body>
</html>
